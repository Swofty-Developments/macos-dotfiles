# AeroSpace config - Hyprland-style keybindings
# https://nikitabobko.github.io/AeroSpace/guide

# Start AeroSpace at login
start-at-login = true

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Mouse follows focus
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['move-mouse window-lazy-center']

automatically-unhide-macos-hidden-apps = true

# Notify SketchyBar on workspace change
exec-on-workspace-change = ['/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE && $HOME/.config/sketchybar/plugins/update_icons.sh &'
]

# Pin workspaces to monitors (per-monitor workspaces like Hyprland)
[workspace-to-monitor-force-assignment]
1 = 1
2 = 1
3 = 1
4 = 1
5 = 1
6 = 1
7 = 1
8 = 1
9 = 1
11 = 2
12 = 2
13 = 2
14 = 2
15 = 2
16 = 2
17 = 2
18 = 2
19 = 2

# Gaps (like Hyprland gaps_in / gaps_out)
[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.right = 8
outer.bottom = 8
outer.top = [{ monitor.'Built-in Retina Display' = 22 }, 48]

# Main mode keybindings (alt = mod key, like Hyprland's $mainMod = SUPER)
# On macOS, alt is the closest to Super for tiling WM usage
[mode.main.binding]

# Focus windows (super + h/j/k/l like Hyprland)
cmd-h = 'focus left'
cmd-j = 'focus down'
cmd-k = 'focus up'
cmd-l = 'focus right'

# Move windows (super + shift + h/j/k/l)
cmd-shift-h = 'move left'
cmd-shift-j = 'move down'
cmd-shift-k = 'move up'
cmd-shift-l = 'move right'

# Swap windows
cmd-shift-s = 'swap left'

# Toggle layout (like Hyprland toggle split)
alt-e = 'layout tiles horizontal vertical'
alt-shift-e = 'layout tiles vertical horizontal'

# Toggle floating (super + shift + space, like Hyprland)
cmd-shift-space = 'layout floating tiling'

# Fullscreen (super + f, like Hyprland)
cmd-shift-f = 'fullscreen'

# Fullscreen toggle (super + x)
alt-x = 'fullscreen'

# Close window (super + shift + q, like Hyprland's killactive)
cmd-shift-q = 'close'

# Join with (like Hyprland's preselect)
alt-v = 'join-with right'
alt-shift-v = 'join-with down'

# Resize (super + ctrl + h/j/k/l)
cmd-ctrl-h = 'resize width -50'
cmd-ctrl-l = 'resize width +50'
cmd-ctrl-j = 'resize height +50'
cmd-ctrl-k = 'resize height -50'

# Balance sizes
cmd-shift-b = 'balance-sizes'

# Switch workspaces - context-aware per monitor (cmd + number)
cmd-1 = 'exec-and-forget $HOME/.config/sketchybar/plugins/ws.sh switch 1'
cmd-2 = 'exec-and-forget $HOME/.config/sketchybar/plugins/ws.sh switch 2'
cmd-3 = 'exec-and-forget $HOME/.config/sketchybar/plugins/ws.sh switch 3'
cmd-4 = 'exec-and-forget $HOME/.config/sketchybar/plugins/ws.sh switch 4'
cmd-5 = 'exec-and-forget $HOME/.config/sketchybar/plugins/ws.sh switch 5'
cmd-6 = 'exec-and-forget $HOME/.config/sketchybar/plugins/ws.sh switch 6'
cmd-7 = 'exec-and-forget $HOME/.config/sketchybar/plugins/ws.sh switch 7'
cmd-8 = 'exec-and-forget $HOME/.config/sketchybar/plugins/ws.sh switch 8'
cmd-9 = 'exec-and-forget $HOME/.config/sketchybar/plugins/ws.sh switch 9'

# Move window to workspace and follow - context-aware per monitor (cmd + shift + number)
cmd-shift-1 = 'exec-and-forget $HOME/.config/sketchybar/plugins/ws.sh move 1'
cmd-shift-2 = 'exec-and-forget $HOME/.config/sketchybar/plugins/ws.sh move 2'
cmd-shift-3 = 'exec-and-forget $HOME/.config/sketchybar/plugins/ws.sh move 3'
cmd-shift-4 = 'exec-and-forget $HOME/.config/sketchybar/plugins/ws.sh move 4'
cmd-shift-5 = 'exec-and-forget $HOME/.config/sketchybar/plugins/ws.sh move 5'
cmd-shift-6 = 'exec-and-forget $HOME/.config/sketchybar/plugins/ws.sh move 6'
cmd-shift-7 = 'exec-and-forget $HOME/.config/sketchybar/plugins/ws.sh move 7'
cmd-shift-8 = 'exec-and-forget $HOME/.config/sketchybar/plugins/ws.sh move 8'
cmd-shift-9 = 'exec-and-forget $HOME/.config/sketchybar/plugins/ws.sh move 9'

# Launch terminal (super + return, like Hyprland)
cmd-enter = 'exec-and-forget open -na Alacritty'

# Workspace back and forth
alt-tab = 'workspace-back-and-forth'

# Focus monitor
cmd-d = 'focus-monitor --wrap-around next'
cmd-shift-a = 'exec-and-forget $HOME/.config/sketchybar/plugins/move_ws_to_monitor.sh left'
cmd-shift-d = 'exec-and-forget $HOME/.config/sketchybar/plugins/move_ws_to_monitor.sh right'

# Reload config
cmd-shift-r = 'reload-config'

# Service mode (like Hyprland submap)
cmd-shift-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
cmd-shift-h = ['join-with left', 'mode main']
cmd-shift-j = ['join-with down', 'mode main']
cmd-shift-k = ['join-with up', 'mode main']
cmd-shift-l = ['join-with right', 'mode main']
