# Alacritty Config — Catppuccin Mocha + Minimal Chrome

[window]
decorations = "Buttonless"
opacity = 0.92
blur = true
padding = { x = 8, y = 8 }
dynamic_padding = true
option_as_alt = "Both"

[font]
size = 14.0

[font.normal]
family = "MesloLGS Nerd Font Mono"
style = "Regular"

[font.bold]
family = "MesloLGS Nerd Font Mono"
style = "Bold"

[font.italic]
family = "MesloLGS Nerd Font Mono"
style = "Light"

[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 500
unfocused_hollow = true

[mouse]
hide_when_typing = true

# ── Catppuccin Mocha ──

