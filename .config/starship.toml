# Minimal, clean prompt - Arch vibes on macOS

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
vimcmd_symbol = '[❮](bold purple)'

[directory]
style = 'bold cyan'
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = ' '
style = 'bold purple'

[git_status]
style = 'bold red'
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
modified = '!${count}'
untracked = '?${count}'
staged = '+${count}'

[cmd_duration]
min_time = 2000
style = 'bold yellow'
format = '[$duration]($style) '

[python]
symbol = ' '
style = 'bold blue'

[nodejs]
symbol = ' '
style = 'bold green'

[rust]
symbol = ' '
style = 'bold orange'

[golang]
symbol = ' '
style = 'bold cyan'
